<style>
:root{--navy:#0A1628;--teal:#0D9488;--teal-light:#14B8A6;--teal-dim:rgba(13,148,136,.12);--cream:#F7F4EF;--cream-dark:#EDE9E1;--text:#1A2840;--muted:#64748B;--white:#fff;--red:#E11D48;--gold:#D4A847;--border:rgba(10,22,40,.1);--font-display:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif;--radius-card:16px;--radius-btn:100px;--radius-icon:9px;--shadow-card:0 8px 30px rgba(10,22,40,.10);--shadow-heavy:0 20px 50px rgba(10,22,40,.12);--shadow-btn:0 4px 20px rgba(13,148,136,.35)}
*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--text);font-family:var(--font-body)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:min(480px,100%);min-height:100vh;margin:auto;background:var(--cream)}.screen{min-height:100vh;padding:22px 18px 104px}.no-tabs{padding-bottom:28px}.logo{display:block;width:196px}.hero{width:min(350px,94%);margin:44px auto 28px}.logo-line{fill:none;stroke:var(--teal);stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round}.logo-word{fill:#dff7fb;stroke:var(--teal);stroke-width:.7;paint-order:stroke;font-family:var(--font-body);font-size:58px;font-weight:600}h1,h2,h3,p{margin:0}h1,h2,.serif{font-family:var(--font-display);font-weight:400;color:var(--navy)}h1{font-size:45px;line-height:.98}h2{font-size:31px;line-height:1.02}.eyebrow{color:var(--teal);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}.muted{color:var(--muted);line-height:1.55}.stack{display:grid;gap:14px}.row,.between{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}.avatar{width:42px;height:42px;border-radius:50%;border:0;display:grid;place-items:center;background:var(--navy);color:#fff;font-weight:600}.card,.soft{border:1px solid var(--border);border-radius:var(--radius-card);padding:16px}.card{background:var(--white);box-shadow:var(--shadow-card)}.soft{background:var(--cream-dark)}.btn{min-height:52px;border:0;border-radius:var(--radius-btn);padding:0 18px;background:var(--teal);color:#fff;font-weight:600;box-shadow:var(--shadow-btn)}.block{width:100%}.ghost{background:transparent;color:var(--navy);border:1px solid var(--border);box-shadow:none}.navy{background:var(--navy);box-shadow:none}.redbtn{background:var(--red);box-shadow:none}.small{min-height:38px;padding-inline:14px;font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;min-height:28px;border-radius:100px;padding:0 11px;background:var(--teal-dim);color:var(--teal);font-size:12px;font-weight:600;white-space:nowrap}.pill.n{background:rgba(10,22,40,.1);color:var(--navy)}.pill.g{background:rgba(212,168,71,.16);color:#9a711d}.pill.r{background:rgba(225,29,72,.10);color:var(--red)}.ico{width:42px;height:42px;display:grid;place-items:center;border-radius:var(--radius-icon);background:var(--teal-dim);color:var(--teal);flex:0 0 auto}.ico.g{background:rgba(212,168,71,.16);color:var(--gold)}.ico.r{background:rgba(225,29,72,.1);color:var(--red)}svg.i{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.num{font-family:var(--font-display);font-size:96px;line-height:.75;color:rgba(13,148,136,.14)}.rolegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.role{min-height:126px;text-align:left;position:relative;background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow-card)}.role.sel{border:2px solid var(--teal)}.check{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--teal);color:#fff}.progress{height:9px;display:grid;gap:5px;grid-auto-flow:column;margin:14px 0}.seg{border-radius:100px;background:rgba(10,22,40,.12)}.seg.on{background:var(--teal)}.upload{border:1px dashed rgba(13,148,136,.35);border-radius:14px;background:var(--cream);padding:13px}.field{display:grid;gap:7px}label{font-size:13px;font-weight:600;color:var(--navy)}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--cream);color:var(--text);padding:13px 14px;outline-color:var(--teal)}textarea{min-height:90px}.shift{display:grid;gap:14px}.shift.hot{border-left:3px solid var(--teal);box-shadow:var(--shadow-heavy)}.shiftmain{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}.rate{font-family:var(--font-display);color:var(--navy);font-size:28px;line-height:1;text-align:right}.tabs{position:fixed;left:50%;bottom:0;width:min(480px,100%);transform:translateX(-50%);display:grid;gap:4px;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:var(--navy)}.tabs.w{grid-template-columns:repeat(4,1fr)}.tabs.f{grid-template-columns:repeat(3,1fr)}.tab{min-height:52px;border:0;border-radius:12px;background:transparent;color:rgba(255,255,255,.62);display:grid;place-items:center;font-size:11px;font-weight:500}.tab.on{color:var(--teal-light);background:rgba(20,184,166,.12)}.earn{background:linear-gradient(135deg,rgba(13,148,136,.18),rgba(13,148,136,.04));border-color:rgba(13,148,136,.18)}.amount{font-family:var(--font-display);color:var(--navy);font-size:44px}.info{border-left:3px solid var(--teal);background:var(--teal-dim);border-radius:12px;padding:12px}.banner{border-radius:14px;padding:14px;background:var(--teal);color:#fff;font-weight:600}.banner.dark{background:var(--navy)}.cred{display:grid;grid-template-columns:auto 1fr;gap:12px}.ctitle{font-family:var(--font-display);color:var(--navy);font-size:18px}.tx{display:flex;justify-content:space-between;gap:14px;padding-block:12px;border-bottom:1px solid var(--border)}.tx:last-child{border:0}.gold{color:#9a711d}.pulse{animation:pulse 1.4s ease-in-out infinite}.modalbg{position:fixed;inset:0;z-index:20;background:rgba(10,22,40,.72);display:grid;place-items:center;padding:20px}.modal{width:min(420px,100%);background:#fff;border-radius:20px;padding:20px;box-shadow:var(--shadow-heavy)}@keyframes pulse{50%{transform:translateY(-1px);box-shadow:0 6px 26px rgba(13,148,136,.42)}}@media(min-width:760px){body{padding-block:24px}.app{border:1px solid var(--border);box-shadow:var(--shadow-heavy)}}
</style></head><body><div id="app" class="app"></div><script>
const ROLE_CREDENTIALS={RN:['license','bls','acls','tbTest','fluShot','backgroundCheck'],LPN:['license','bls','tbTest','fluShot','backgroundCheck'],CNA:['license','bls','tbTest','fluShot','backgroundCheck'],MA:['certification','bls','tbTest','fluShot','backgroundCheck'],PCT:['certification','bls','tbTest','backgroundCheck'],Phlebotomist:['certification','tbTest','backgroundCheck'],RadTech:['license','bls','tbTest','backgroundCheck'],EMT:['certification','bls','tbTest','backgroundCheck']};
const CM={license:['Nursing License','Required by state board for licensed facility shifts.','shield'],certification:['Professional Certification','Confirms the specialty credential for your selected role.','file'],bls:['BLS Certification','Required for patient-facing clinical shifts.','heart'],acls:['ACLS Certification','Required for higher-acuity RN placements.','heart'],tbTest:['TB Test','Keeps facility compliance records current.','file'],fluShot:['Flu Vaccination','Required seasonally by many facilities.','file'],backgroundCheck:['Background Check','Checkr status must be clear before activation.','shield']};
const ROLES=[['RN','Registered Nurse'],['LPN','Licensed Practical Nurse'],['CNA','Nursing Assistant'],['MA','Medical Assistant'],['PCT','Patient Care Tech'],['Phlebotomist','Lab Collection'],['RadTech','Radiology Tech'],['EMT','Emergency Medical Tech']];
const t=Date.now(),base=[{shiftId:'s1',facilityName:'Northline Medical Center',facilityAddress:'440 Lakeview Ave',role:'RN',startTime:t+45*60000,endTime:t+525*60000,hourlyRate:68,status:'open',isUrgent:true,claimedBy:null,distance:3.1,lockGuaranteeHours:2,lockGuaranteePaid:false,onMyWayAt:null,clockInAt:null,clockOutAt:null,workerEta:null},{shiftId:'s2',facilityName:'Harbor Urgent Care',facilityAddress:'1188 Harbor Rd',role:'RN',startTime:t+26*3600000,endTime:t+34*3600000,hourlyRate:62,status:'open',isUrgent:false,claimedBy:null,distance:6.4,lockGuaranteeHours:2,lockGuaranteePaid:false,onMyWayAt:null,clockInAt:null,clockOutAt:null,workerEta:null},{shiftId:'s3',facilityName:'Greenway Surgery Center',facilityAddress:'72 Greenway Blvd',role:'CNA',startTime:t+5*3600000,endTime:t+13*3600000,hourlyRate:36,status:'open',isUrgent:true,claimedBy:null,distance:8.9,lockGuaranteeHours:2,lockGuaranteePaid:false,onMyWayAt:null,clockInAt:null,clockOutAt:null,workerEta:null}];
let S=JSON.parse(localStorage.psv1||'null')||{route:'splash',slide:0,role:'RN',type:'worker',wtab:'shifts',ftab:'post',up:{},shifts:base,notices:[],modal:null};if(!S.shifts?.length)S.shifts=base;const A=document.getElementById('app');let clock;
function save(){localStorage.psv1=JSON.stringify(S)}function I(n){let p={briefcase:"<rect x='3' y='7' width='18' height='13' rx='2'/><path d='M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2'/>",calendar:"<path d='M8 2v4M16 2v4'/><rect x='3' y='4' width='18' height='18' rx='2'/><path d='M3 10h18'/>",shield:"<path d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/><path d='m9 12 2 2 4-5'/>",user:"<path d='M20 21a8 8 0 0 0-16 0'/><circle cx='12' cy='7' r='4'/>",plus:"<circle cx='12' cy='12' r='10'/><path d='M12 8v8M8 12h8'/>",list:"<path d='M8 6h13M8 12h13M8 18h13'/><path d='M3 6h.01M3 12h.01M3 18h.01'/>",settings:"<circle cx='12' cy='12' r='3'/><path d='M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3 13.6H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.3.5.6.9.6H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1.4z'/>",lock:"<rect x='4' y='10' width='16' height='11' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/>",file:"<path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><path d='M14 2v6h6'/>",heart:"<path d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z'/>",check:"<path d='M20 6 9 17l-5-5'/>",clock:"<circle cx='12' cy='12' r='10'/><path d='M12 6v6l4 2'/>"};return `<svg class='i' viewBox='0 0 24 24'>${p[n]||p.file}</svg>`}
function logo(c=''){return `<svg class='logo ${c}' viewBox='0 0 620 160' role='img' aria-label='PulseShift logo'><path class='logo-line' d='M18 84 H86 L108 54 L132 122 L182 20 L232 142 L252 84 H298'/><text class='logo-word' x='316' y='108'>PulseShift</text></svg>`}function dt(x){return new Date(x).toLocaleDateString([],{month:'short',day:'numeric'})}function tm(x){return new Date(x).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}function st(s){return `${dt(s.startTime)}, ${tm(s.startTime)} - ${tm(s.endTime)}`}function hrs(s){return(s.endTime-s.startTime)/36e5}function go(r,p={}){Object.assign(S,{route:r},p);save();render()}function note(a,b){S.notices.unshift({a,b});S.notices=S.notices.slice(0,6)}function top(x){return `<header class='topbar'><div>${logo()}</div><button class='avatar' onclick="go('splash')">${S.type=='worker'?S.role.slice(0,2):'F'}</button></header><p class='eyebrow'>${x}</p>`}function lay(c,t='',n=false){A.innerHTML=`<main class='screen ${n?'no-tabs':''}'>${c}</main>${t}${modal()}`}function wt(){return `<nav class='tabs w'>${[['shifts','briefcase','Shifts'],['mine','calendar','My Shifts'],['cred','shield','Credentials'],['profile','user','Profile']].map(a=>`<button class='tab ${S.wtab==a[0]?'on':''}' onclick="S.wtab='${a[0]}';go('worker')">${I(a[1])}<span>${a[2]}</span></button>`).join('')}</nav>`}function ft(){return `<nav class='tabs f'>${[['post','plus','Post'],['posted','list','My Shifts'],['account','settings','Account']].map(a=>`<button class='tab ${S.ftab==a[0]?'on':''}' onclick="S.ftab='${a[0]}';go('facility')">${I(a[1])}<span>${a[2]}</span></button>`).join('')}</nav>`}
function splash(){let slides=[['01','Find clinical shifts nearby.','Open shifts are filtered by your verified role and sorted by distance.'],['02','Claim with lock-in protection.','If a facility cancels close to start time, your two-hour guarantee is tracked automatically.'],['03','Arrive, clock in, get paid.','On My Way alerts, live arrival status, and earnings are built into the workflow.']],s=slides[S.slide];lay(`${logo('hero')}<section class='card stack'><div class='num'>${s[0]}</div><p class='eyebrow'>V1 marketplace</p><h1>${s[1]}</h1><p class='muted'>${s[2]}</p></section><div class='stack' style='margin-top:18px'><button class='btn block' onclick='next()'>${S.slide==2?'Choose Role':'Next'}</button><button class='btn ghost block' onclick="go('role')">Skip</button></div>`,'',true)}function next(){S.slide<2?S.slide++:S.route='role';save();render()}
function role(){lay(`${top('Role-specific onboarding')}<div class='between' style='margin-bottom:16px'><div><h2>Select your role</h2><p class='muted'>Your credential checklist adapts to this role.</p></div></div><div class='rolegrid'>${ROLES.map(r=>`<button class='role ${S.role==r[0]?'sel':''}' onclick="S.role='${r[0]}';save();render()"><span class='ico'>${I(r[0]=='RN'||r[0]=='LPN'?'shield':'file')}</span>${S.role==r[0]?`<span class='check'>${I('check')}</span>`:''}<div style='margin-top:12px'><h3 class='serif' style='font-size:22px'>${r[0]}</h3><p class='muted' style='font-size:13px'>${r[1]}</p></div></button>`).join('')}</div><div class='stack' style='margin-top:18px'><button class='btn block' onclick="go('upload')">Continue</button><button class='btn ghost block' onclick="S.type='facility';S.ftab='post';go('facility')">Continue as Facility</button></div>`,'',true)}function req(){return ROLE_CREDENTIALS[S.role]||ROLE_CREDENTIALS.RN}function cstat(k){let u=S.up[k];if(!u)return['pending','n','Required before shift access'];if(k=='backgroundCheck')return['verified','','Clear'];let d=Math.ceil((u.exp-Date.now())/864e5);if(d<0)return['expired','r','Expired - Upload renewal'];if(d<=30)return['expiring','g',`Expires in ${d} days`];return['verified','',`Verified - Expires ${dt(u.exp)}`]}function up(k){S.up[k]={exp:k=='backgroundCheck'?null:Date.now()+(k=='bls'?28:120)*864e5};note('Credential uploaded',`${CM[k][0]} is now pending review.`);save();render()}function upload(){let r=req(),done=r.filter(k=>S.up[k]).length;lay(`${top('Credential upload')}<div class='between'><div><h2>${S.role} checklist</h2><p class='muted'>Step ${Math.min(done+1,r.length)} of ${r.length}. Upload every required item to unlock the feed.</p></div><span class='pill'>${done}/${r.length}</span></div><div class='progress'>${r.map(k=>`<span class='seg ${S.up[k]?'on':''}'></span>`).join('')}</div><div class='stack'>${r.map(cupload).join('')}</div><div class='stack' style='margin-top:18px'><button class='btn block' ${done<r.length?'disabled style="opacity:.45;box-shadow:none"':''} onclick="S.type='worker';S.wtab='shifts';go('worker')">Enter Shift Feed</button><p class='muted' style='font-size:13px'>${done<r.length?'Profile remains pending until required credentials are uploaded.':'All required items are uploaded and ready for review.'}</p></div>`,'',true)}function cupload(k){let m=CM[k],u=S.up[k];return `<article class='card cred'><span class='ico'>${I(m[2])}</span><div class='stack' style='gap:10px'><div><p class='ctitle'>${m[0]}</p><p class='muted' style='font-size:13px'>${m[1]}</p></div>${u?`<div class='upload row' style='color:var(--teal);font-weight:600'>${I('check')} Uploaded</div>`:`<button class='upload' style='text-align:left;color:var(--teal);font-weight:600' onclick="up('${k}')">${I('file')} Upload document</button>`}${k!='backgroundCheck'?`<div class='field'><label>Expiration date</label><input type='date'></div>`:''}</div></article>`}
function open(){return S.shifts.filter(s=>s.status=='open'&&s.role==S.role).sort((a,b)=>a.distance-b.distance)}function mine(){return S.shifts.filter(s=>s.claimedBy=='worker-demo').sort((a,b)=>a.startTime-b.startTime)}function scard(s,d=false){let is=s.claimedBy=='worker-demo',mins=(s.startTime-Date.now())/6e4,travel=is&&s.status=='claimed'&&mins<=60&&mins>-30,tone=s.role=='CNA'?'g':'';return `<article class='card shift ${travel&&!s.onMyWayAt?'hot':''}'><div class='shiftmain'><span class='ico ${tone}'>${I('briefcase')}</span><div><div class='between' style='align-items:flex-start'><div><h3>${s.facilityName}</h3><p class='muted' style='font-size:13px'>${s.role} - ${s.distance.toFixed(1)} mi<br>${st(s)}</p></div>${s.isUrgent?`<span class='pill r'>Urgent</span>`:''}</div>${is?`<span class='pill n' style='margin-top:10px'>${I('lock')} Shift Lock</span>`:''}</div><div><p class='rate'>$${s.hourlyRate}</p><p class='muted' style='font-size:12px;text-align:right'>${hrs(s).toFixed(0)} hrs</p></div></div>${d?detail(s):actions(s,travel)}</article>`}function actions(s,travel){if(s.status=='open')return `<button class='btn ghost block' onclick="go('detail',{detail:'${s.shiftId}'})">View Details</button>`;if(s.status=='cancelled')return `<span class='pill r'>Cancelled</span>`;if(s.clockOutAt)return `<span class='pill n'>Shift Complete - ${((s.clockOutAt-s.clockInAt)/36e5).toFixed(1)} hrs</span>`;if(s.clockInAt)return `<div class='between'><span class='pill'>${I('clock')} Clocked In - ${elapsed(s.clockInAt)}</span><button class='btn small ghost' onclick="out('${s.shiftId}')">End Shift</button></div>`;if(s.onMyWayAt)return `<div class='between'><span class='pill n'>En Route - ETA ${s.workerEta} min</span><button class='btn small' onclick="cin('${s.shiftId}')">I'm Here</button></div>`;if(travel)return `<button class='btn block pulse' onclick="omw('${s.shiftId}')">On My Way</button>`;return `<span class='pill n'>${s.status}</span>`}function detail(s){return s.status!='open'?`<span class='pill n'>Already claimed</span>`:`<div class='stack'><button class='btn block' onclick="claim('${s.shiftId}')">Claim Shift</button><div class='info row'>${I('lock')}<span>Shift Lock active - if this shift is cancelled within 4hrs of start, you receive 2hr pay automatically.</span></div></div>`}
function worker(){if(S.wtab=='mine')return my();if(S.wtab=='cred')return creds();if(S.wtab=='profile')return profile();let inactive=req().some(k=>!S.up[k]||cstat(k)[0]=='expired');lay(`${top('Shifts near you')}<div class='between' style='margin-bottom:16px'><div><h2>Open Shifts</h2><p class='muted'>Filtered for ${S.role}, within 25 miles, sorted by distance.</p></div><span class='pill'>${S.role}</span></div>${inactive?`<section class='soft stack' style='margin-bottom:16px'><h3>Profile pending</h3><p class='muted'>Upload and maintain every required credential before accepting shifts.</p><button class='btn small' onclick="S.wtab='cred';go('worker')">Review Credentials</button></section>`:''}<div class='stack'>${open().map(s=>scard(s)).join('')||`<section class='card'><p class='muted'>No open ${S.role} shifts right now.</p></section>`}</div>`,wt())}function det(){let s=S.shifts.find(x=>x.shiftId==S.detail)||open()[0];lay(`${top('Shift detail')}<div class='between' style='margin-bottom:16px'><h2>Shift Detail</h2><button class='btn small ghost' onclick="go('worker')">Back</button></div>${s?scard(s,true):'<section class=card>Shift not found.</section>'}<section class='card stack' style='margin-top:14px'><p class='eyebrow'>Payout model</p><p class='muted'>Claim transaction sets status to claimed, claimedBy to your uid, and lockedAt to server time. Facility gets a push notification.</p></section>`,wt())}function claim(id){S.shifts=S.shifts.map(s=>s.shiftId==id?{...s,status:'claimed',claimedBy:'worker-demo',lockedAt:Date.now()}:s);note('Shift claimed','Facility has been notified.');S.wtab='mine';go('worker')}function omw(id){S.shifts=S.shifts.map(s=>s.shiftId==id?{...s,onMyWayAt:Date.now(),workerEta:18}:s);note('Facility notified','Alex Rivera is on their way - estimated arrival in 18 minutes.');save();render()}function cin(id){S.shifts=S.shifts.map(s=>s.shiftId==id?{...s,status:'in_progress',clockInAt:Date.now()}:s);note('Clock-in sent','Alex Rivera has arrived and clocked in.');save();render()}function out(id){S.shifts=S.shifts.map(s=>s.shiftId==id?{...s,status:'completed',clockOutAt:Date.now()}:s);note('Shift complete','Payout calculation has been triggered.');save();render()}function cancel(id){S.modal=id;save();render()}function ccancel(){let id=S.modal;S.shifts=S.shifts.map(s=>{if(s.shiftId!=id)return s;let g=s.claimedBy&&s.startTime-Date.now()<=4*36e5;if(g)note('Lock-In Guarantee',`Your shift was cancelled. Your lock-in payment of $${s.lockGuaranteeHours*s.hourlyRate} is on its way.`);return {...s,status:'cancelled',lockGuaranteePaid:g}});S.modal=null;save();render()}
function my(){let m=mine(),regular=m.filter(s=>s.clockOutAt).reduce((a,s)=>a+((s.clockOutAt-s.clockInAt)/36e5)*s.hourlyRate,0),lock=m.filter(s=>s.lockGuaranteePaid).reduce((a,s)=>a+s.lockGuaranteeHours*s.hourlyRate,0);lay(`${top('Upcoming and earnings')}<section class='card earn stack' style='margin-bottom:16px'><p class='eyebrow'>This week</p><p class='amount'>$${Math.round(regular+lock)}</p><p class='muted'>Includes completed shifts and lock-in guarantee payouts.</p></section><div class='between' style='margin-bottom:14px'><h2>My Shifts</h2><span class='pill'>${m.length}</span></div><div class='stack'>${m.map(s=>scard(s)).join('')||`<section class='card'><p class='muted'>Claim a shift to see it here.</p></section>`}</div><section class='card stack' style='margin-top:16px'><p class='eyebrow'>Earnings history</p>${hist(m)}</section>`,wt())}function hist(m){let rows=[];m.forEach(s=>{if(s.clockOutAt)rows.push(`<div class='tx'><div><strong>${s.facilityName}</strong><p class='muted'>Regular shift payout</p></div><strong>$${Math.round(((s.clockOutAt-s.clockInAt)/36e5)*s.hourlyRate)}</strong></div>`);if(s.lockGuaranteePaid)rows.push(`<div class='tx'><div><strong class='gold'>Lock-In Guarantee</strong><p class='muted'>${s.facilityName}</p></div><strong class='gold'>$${s.lockGuaranteeHours*s.hourlyRate}</strong></div>`)});return rows.join('')||`<p class='muted'>No earnings yet.</p>`}
function creds(){let r=req(),issues=r.filter(k=>['expired','expiring','pending'].includes(cstat(k)[0]));lay(`${top('Credential alerts')}<section class='banner ${issues.length?'dark':''}' style='margin-bottom:16px'>${issues.length?`${issues.length} credential(s) need attention`:'All credentials active'}</section><div class='stack'>${r.map(cbadge).join('')}</div><section class='soft stack' style='margin-top:16px'><p class='eyebrow'>Notification schedule</p><p class='muted'>Alerts send at 60, 30, and 7 days. Expired credentials pause shift access until renewal is uploaded.</p></section>`,wt())}function cbadge(k){let m=CM[k],s=cstat(k);return `<article class='card cred'><span class='ico ${s[1]}'>${I(m[2])}</span><div><p class='ctitle'>${m[0]}</p><p class='muted' style='color:${s[1]=='r'?'var(--red)':s[1]=='g'?'var(--gold)':'var(--muted)'}'>${s[2]}</p>${s[0]=='expired'?`<button class='btn small redbtn' style='margin-top:10px' onclick="up('${k}')">Upload Renewal</button>`:''}</div></article>`}function profile(){lay(`${top('Profile')}<section class='card stack'><div class='between'><div><h2>Alex Rivera</h2><p class='muted'>${S.role} - 8 years experience</p></div><span class='pill'>Active</span></div><button class='btn ghost block'>Payout Settings</button><button class='btn ghost block' onclick="go('role')">Change Role</button></section><section class='card stack' style='margin-top:16px'><p class='eyebrow'>Recent notifications</p>${S.notices.map(n=>`<div class='tx'><div><strong>${n.a}</strong><p class='muted'>${n.b}</p></div></div>`).join('')||`<p class='muted'>No notifications yet.</p>`}</section>`,wt())}
function facility(){if(S.ftab=='posted')return fshifts();if(S.ftab=='account')return facct();lay(`${top('Facility tools')}<div class='between' style='margin-bottom:16px'><div><h2>Post Shift</h2><p class='muted'>Urgent is auto-flagged when start time is within 6 hours.</p></div></div><section class='card stack'><div class='field'><label>Role needed</label><select><option>RN</option><option>LPN</option><option>CNA</option><option>MA</option></select></div><div class='field'><label>Hourly rate</label><input type='number' value='68'></div><div class='field'><label>Notes</label><textarea>Telemetry floor, active license required.</textarea></div><button class='btn block' onclick="note('Shift posted','Matching nearby workers will be notified.');S.ftab='posted';go('facility')">Post Shift</button></section>`,ft())}function fshifts(){lay(`${top('Facility shift board')}<div class='between' style='margin-bottom:16px'><h2>My Shifts</h2><span class='pill'>${S.shifts.length}</span></div><div class='stack'>${S.shifts.map(fcard).join('')}</div>`,ft())}function fcard(s){let can=s.claimedBy&&s.status!='cancelled'&&s.status!='completed',st=s.clockInAt?`Checked in at ${tm(s.clockInAt)}`:s.onMyWayAt?`On the way - ETA ${s.workerEta} min`:'Awaiting arrival';return `<article class='card shift'><div class='between'><div><h3>${s.facilityName}</h3><p class='muted'>${s.role} - ${st}</p></div><span class='pill n'>${s.status}</span></div>${s.claimedBy?`<div class='soft row'><span class='avatar' style='width:34px;height:34px'>AR</span><div><strong>Alex Rivera</strong><p class='muted'>${st}</p></div></div>`:`<p class='muted'>No worker claimed yet.</p>`}${can?`<button class='btn ghost block' onclick="cancel('${s.shiftId}')">Cancel Shift</button>`:''}</article>`}function facct(){lay(`${top('Account')}<section class='card stack'><div class='between'><div><h2>Northline</h2><p class='muted'>Hospital - verified facility</p></div><span class='pill'>Verified</span></div><div class='soft'><p class='eyebrow'>Transparency score</p><p class='amount'>96</p></div><button class='btn ghost block'>Billing</button><button class='btn ghost block'>Usage History</button></section>`,ft())}function modal(){if(!S.modal)return'';let s=S.shifts.find(x=>x.shiftId==S.modal),h=Math.max(0,(s.startTime-Date.now())/36e5).toFixed(1),p=s.lockGuaranteeHours*s.hourlyRate;return `<div class='modalbg'><section class='modal stack'><h2>Cancel this shift?</h2><p class='muted'>This shift starts in ${h} hrs. Cancelling now will trigger an automatic 2-hour lock-in payment of $${p} to Alex Rivera. This cannot be undone.</p><div class='between'><button class='btn ghost' onclick="S.modal=null;save();render()">Go Back</button><button class='btn redbtn' onclick='ccancel()'>Confirm & Cancel</button></div></section></div>`}function elapsed(x){let v=Math.max(0,Math.floor((Date.now()-x)/1000));return `${String(Math.floor(v/3600)).padStart(2,'0')}:${String(Math.floor(v%3600/60)).padStart(2,'0')}:${String(v%60).padStart(2,'0')}`}function render(){clearInterval(clock);if(S.route=='splash')splash();else if(S.route=='role')role();else if(S.route=='upload')upload();else if(S.route=='detail')det();else if(S.route=='facility')facility();else worker();clock=setInterval(()=>{if(S.route=='worker'&&S.wtab=='mine')my()},1000)}
Object.assign(window,{next,go,up,claim,omw,cin,out,cancel,ccancel,render});if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});render();
</script></body></html>
