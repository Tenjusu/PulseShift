<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>PulseShift V1</title>
<meta name="theme-color" content="#0A1628" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
<style>
:root{--navy:#0A1628;--navy-ui:#0A1628;--teal:#0D9488;--teal-light:#14B8A6;--teal-dim:rgba(13,148,136,.12);--cream:#F7F4EF;--cream-dark:#EDE9E1;--text:#1A2840;--muted:#64748B;--white:#fff;--red:#E11D48;--gold:#D4A847;--border:rgba(10,22,40,.1);--display:'DM Serif Display',serif;--body:'DM Sans',sans-serif;--shadow:0 8px 30px rgba(10,22,40,.1);--heavy:0 20px 50px rgba(10,22,40,.12)}
body.dark{--navy:#EAF7F6;--navy-ui:#07111F;--cream:#081320;--cream-dark:#0E2034;--text:#EAF7F6;--muted:#9FB3C8;--white:#10233B;--border:rgba(223,247,251,.13);--teal-dim:rgba(20,184,166,.16);--shadow:0 10px 32px rgba(0,0,0,.24);--heavy:0 22px 60px rgba(0,0,0,.36)}
*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--text);font-family:var(--body);transition:background .25s ease,color .25s ease}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:min(480px,100%);min-height:100vh;margin:auto;background:var(--cream);transition:background .25s ease}.screen{min-height:100vh;padding:22px 18px 104px}.no-tabs{padding-bottom:32px}.logo{display:block;width:196px}.logo.hero{width:min(350px,94%);margin:42px auto 16px}.logo-line{fill:none;stroke:var(--teal);stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round}.logo-word{fill:#dff7fb;stroke:var(--teal);stroke-width:.7;paint-order:stroke;font-family:var(--body);font-size:58px;font-weight:600}h1,h2,h3,p{margin:0}h1,h2,.serif{font-family:var(--display);font-weight:400;color:var(--navy)}h1{font-size:45px;line-height:.98}h2{font-size:31px;line-height:1.02}h3{font-size:16px;color:var(--navy)}.eyebrow{color:var(--teal);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}.muted{color:var(--muted);line-height:1.55}.stack{display:grid;gap:14px}.row,.between{display:flex;align-items:center;gap:10px}.between{justify-content:space-between}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}.top-actions{display:flex;align-items:center;gap:8px}.avatar{min-width:42px;height:42px;border-radius:50%;border:0;background:var(--navy-ui);color:#fff;font-weight:600;padding:0 9px}.theme-toggle{min-height:34px;border:1px solid var(--border);border-radius:100px;background:var(--white);color:var(--text);padding:0 12px;font-size:12px;font-weight:600;box-shadow:var(--shadow)}.theme-float{display:flex;justify-content:flex-end;margin-bottom:2px}.greeting{width:min(350px,94%);margin:0 auto 18px;text-align:center;color:var(--muted);line-height:1.45}.greeting strong{font-family:var(--display);font-weight:400;color:var(--navy);font-size:24px}.card,.soft{border:1px solid var(--border);border-radius:16px;padding:16px}.card{background:var(--white);box-shadow:var(--shadow)}.soft{background:var(--cream-dark)}.btn{min-height:52px;border:0;border-radius:100px;padding:0 18px;background:var(--teal);color:#fff;font-weight:600;box-shadow:0 4px 20px rgba(13,148,136,.35)}.btn.block{width:100%}.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);box-shadow:none}.btn.navy{background:var(--navy-ui);box-shadow:none}.btn.red{background:var(--red);box-shadow:none}.btn.small{min-height:38px;padding-inline:14px;font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;min-height:28px;border-radius:100px;padding:0 11px;background:var(--teal-dim);color:var(--teal);font-size:12px;font-weight:600;white-space:nowrap}.pill.navy{background:rgba(10,22,40,.1);color:var(--navy)}body.dark .pill.navy{background:rgba(255,255,255,.08)}.pill.gold{background:rgba(212,168,71,.16);color:#9a711d}.pill.red{background:rgba(225,29,72,.1);color:var(--red)}.ico{width:42px;height:42px;display:grid;place-items:center;border-radius:9px;background:var(--teal-dim);color:var(--teal);flex:0 0 auto}.ico.gold{background:rgba(212,168,71,.16);color:var(--gold)}.ico.red{background:rgba(225,29,72,.1);color:var(--red)}.i{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.num{font-family:var(--display);font-size:96px;line-height:.75;color:rgba(13,148,136,.14)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.role{min-height:126px;position:relative;text-align:left;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow)}.role.sel{border:2px solid var(--teal)}.check{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--teal);color:#fff}.progress{height:9px;display:grid;grid-auto-flow:column;gap:5px;margin:14px 0}.seg{border-radius:100px;background:rgba(10,22,40,.12)}body.dark .seg{background:rgba(255,255,255,.12)}.seg.on{background:var(--teal)}.upload{border:1px dashed rgba(13,148,136,.35);border-radius:14px;background:var(--cream);padding:13px}.field{display:grid;gap:7px}label{font-size:13px;font-weight:600;color:var(--navy)}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--cream);color:var(--text);padding:13px 14px;outline-color:var(--teal)}textarea{min-height:90px}.shift{display:grid;gap:14px}.shift.hot{border-left:3px solid var(--teal);box-shadow:var(--heavy)}.shift-main{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}.rate{font-family:var(--display);color:var(--navy);font-size:28px;line-height:1;text-align:right}.tabs{position:fixed;left:50%;bottom:0;width:min(480px,100%);transform:translateX(-50%);display:grid;gap:4px;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:var(--navy-ui)}.tabs.worker{grid-template-columns:repeat(4,1fr)}.tabs.facility{grid-template-columns:repeat(3,1fr)}.tab{min-height:52px;border:0;border-radius:12px;background:transparent;color:rgba(255,255,255,.62);display:grid;place-items:center;font-size:11px;font-weight:500}.tab.active{color:var(--teal-light);background:rgba(20,184,166,.12)}.earn{background:linear-gradient(135deg,rgba(13,148,136,.18),rgba(13,148,136,.04));border-color:rgba(13,148,136,.18)}.amount{font-family:var(--display);font-size:44px;color:var(--navy)}.info{border-left:3px solid var(--teal);background:var(--teal-dim);border-radius:12px;padding:12px}.banner{border-radius:14px;padding:14px;background:var(--teal);color:#fff;font-weight:600}.banner.dark{background:var(--navy-ui)}.toast-banner{overflow:hidden;animation:toastAway 4.2s ease forwards}.cred{display:grid;grid-template-columns:auto 1fr;gap:12px}.ctitle{font-family:var(--display);color:var(--navy);font-size:18px}.tx{display:flex;justify-content:space-between;gap:14px;padding-block:12px;border-bottom:1px solid var(--border)}.tx:last-child{border:0}.gold-text{color:#9a711d}.pulse{animation:pulse 1.4s ease-in-out infinite}.modal-bg{position:fixed;inset:0;z-index:20;background:rgba(10,22,40,.72);display:grid;place-items:center;padding:20px}.modal{width:min(420px,100%);background:var(--white);border-radius:20px;padding:20px;box-shadow:var(--heavy)}@keyframes pulse{50%{transform:translateY(-1px);box-shadow:0 6px 26px rgba(13,148,136,.42)}}@keyframes toastAway{0%,72%{opacity:1;max-height:90px;margin-bottom:16px;padding-top:14px;padding-bottom:14px}100%{opacity:0;max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0;border-width:0}}@media(min-width:760px){body{padding-block:24px}.app{border:1px solid var(--border);box-shadow:var(--heavy)}}
</style>
</head>
<body><div id="app" class="app"></div>
<script>
(() => {
const ROLE_CREDENTIALS={RN:['license','bls','acls','tbTest','fluShot','backgroundCheck'],LPN:['license','bls','tbTest','fluShot','backgroundCheck'],CNA:['license','bls','tbTest','fluShot','backgroundCheck'],MA:['certification','bls','tbTest','fluShot','backgroundCheck'],PCT:['certification','bls','tbTest','backgroundCheck'],Phlebotomist:['certification','tbTest','backgroundCheck'],RadTech:['license','bls','tbTest','backgroundCheck'],EMT:['certification','bls','tbTest','backgroundCheck']};
const CREDENTIALS={license:['Nursing License','Required by state board for licensed facility shifts.','shield'],certification:['Professional Certification','Confirms the specialty credential for your selected role.','file'],bls:['BLS Certification','Required for patient-facing clinical shifts.','heart'],acls:['ACLS Certification','Required for higher-acuity RN placements.','heart'],tbTest:['TB Test','Keeps facility compliance records current.','file'],fluShot:['Flu Vaccination','Required seasonally by many facilities.','file'],backgroundCheck:['Background Check','Checkr status must be clear before activation.','shield']};
const ROLES=[['RN','Registered Nurse'],['LPN','Licensed Practical Nurse'],['CNA','Nursing Assistant'],['MA','Medical Assistant'],['PCT','Patient Care Tech'],['Phlebotomist','Lab Collection'],['RadTech','Radiology Tech'],['EMT','Emergency Medical Tech']];
const now=Date.now();
const demoShifts=[{id:'s1',facility:'Northline Medical Center',address:'440 Lakeview Ave',role:'RN',start:now+45*60000,end:now+525*60000,rate:68,status:'open',urgent:true,claimedBy:null,distance:3.1,lockHours:2,lockPaid:false,onMyWayAt:null,clockInAt:null,clockOutAt:null,eta:null},{id:'s2',facility:'Harbor Urgent Care',address:'1188 Harbor Rd',role:'RN',start:now+26*3600000,end:now+34*3600000,rate:62,status:'open',urgent:false,claimedBy:null,distance:6.4,lockHours:2,lockPaid:false,onMyWayAt:null,clockInAt:null,clockOutAt:null,eta:null},{id:'s3',facility:'Greenway Surgery Center',address:'72 Greenway Blvd',role:'CNA',start:now+5*3600000,end:now+13*3600000,rate:36,status:'open',urgent:true,claimedBy:null,distance:8.9,lockHours:2,lockPaid:false,onMyWayAt:null,clockInAt:null,clockOutAt:null,eta:null}];
let state=JSON.parse(localStorage.getItem('ps_v1_fixed')||'null')||{route:'splash',slide:0,role:'RN',roles:['RN'],type:'worker',workerTab:'shifts',facilityTab:'post',uploads:{},shifts:demoShifts,notices:[],modal:null,detail:null,theme:'light'};
if(!state.shifts||!state.shifts.length)state.shifts=demoShifts;if(!state.theme)state.theme='light';if(!Array.isArray(state.roles)||!state.roles.length)state.roles=[state.role||'RN'];state.role=state.roles[0]||'RN';
const app=document.getElementById('app');let tick;
const save=()=>{state.role=state.roles[0]||'RN';localStorage.setItem('ps_v1_fixed',JSON.stringify(state))};
function selectedRoles(){return Array.isArray(state.roles)&&state.roles.length?state.roles:[state.role||'RN']}function rolesLabel(){return selectedRoles().join(', ')}function primaryRole(){return selectedRoles()[0]||'RN'}
function applyTheme(){document.body.classList.toggle('dark',state.theme==='dark');document.querySelector('meta[name="theme-color"]').setAttribute('content',state.theme==='dark'?'#081320':'#0A1628')}
function icon(name){const p={briefcase:"<rect x='3' y='7' width='18' height='13' rx='2'/><path d='M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2'/>",calendar:"<path d='M8 2v4M16 2v4'/><rect x='3' y='4' width='18' height='18' rx='2'/><path d='M3 10h18'/>",shield:"<path d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/><path d='m9 12 2 2 4-5'/>",user:"<path d='M20 21a8 8 0 0 0-16 0'/><circle cx='12' cy='7' r='4'/>",plus:"<circle cx='12' cy='12' r='10'/><path d='M12 8v8M8 12h8'/>",list:"<path d='M8 6h13M8 12h13M8 18h13'/><path d='M3 6h.01M3 12h.01M3 18h.01'/>",settings:"<circle cx='12' cy='12' r='3'/><path d='M12 2v3M12 19v3M4.9 4.9 7 7M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1 7 17M17 7l2.1-2.1'/>",lock:"<rect x='4' y='10' width='16' height='11' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/>",file:"<path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><path d='M14 2v6h6'/>",heart:"<path d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z'/>",check:"<path d='M20 6 9 17l-5-5'/>",clock:"<circle cx='12' cy='12' r='10'/><path d='M12 6v6l4 2'/>"};return `<svg class="i" viewBox="0 0 24 24">${p[name]||p.file}</svg>`}
function logo(cls=''){return `<svg class="logo ${cls}" viewBox="0 0 620 160" role="img" aria-label="PulseShift logo"><path class="logo-line" d="M18 84 H86 L108 54 L132 122 L182 20 L232 142 L252 84 H298"/><text class="logo-word" x="316" y="108">PulseShift</text></svg>`}
function date(ms){return new Date(ms).toLocaleDateString([],{month:'short',day:'numeric'})}function time(ms){return new Date(ms).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}function shiftTime(s){return `${date(s.start)}, ${time(s.start)} - ${time(s.end)}`}function hours(s){return Math.max(0,(s.end-s.start)/3600000)}function note(title,body){state.notices.unshift({title,body});state.notices=state.notices.slice(0,8)}
function themeButton(){return `<button class="theme-toggle" data-act="theme">${state.theme==='dark'?'Light':'Dark'}</button>`}
function setRoute(route,patch={}){state={...state,route,...patch};save();render()}function screen(content,tabs='',plain=false){app.innerHTML=`<main class="screen ${plain?'no-tabs':''}">${content}</main>${tabs}${modalHtml()}`}
function header(label){return `<header class="topbar"><div>${logo()}</div><div class="top-actions">${themeButton()}<button class="avatar" data-act="home">${primaryRole().slice(0,2)}</button></div></header><p class="eyebrow">${label}</p>`}
function workerTabs(){return `<nav class="tabs worker">${[['shifts','briefcase','Shifts'],['mine','calendar','My Shifts'],['cred','shield','Credentials'],['profile','user','Profile']].map(([id,ic,lab])=>`<button class="tab ${state.workerTab===id?'active':''}" data-act="wtab" data-id="${id}">${icon(ic)}<span>${lab}</span></button>`).join('')}</nav>`}
function facilityTabs(){return `<nav class="tabs facility">${[['post','plus','Post'],['posted','list','My Shifts'],['account','settings','Account']].map(([id,ic,lab])=>`<button class="tab ${state.facilityTab===id?'active':''}" data-act="ftab" data-id="${id}">${icon(ic)}<span>${lab}</span></button>`).join('')}</nav>`}
function required(){return [...new Set(selectedRoles().flatMap(r=>ROLE_CREDENTIALS[r]||[]))]}function credStatus(key){const u=state.uploads[key];if(!u)return ['pending','navy','Required before shift access'];if(key==='backgroundCheck')return ['verified','','Clear'];const days=Math.ceil((u.exp-Date.now())/86400000);if(days<0)return ['expired','red','Expired - Upload renewal'];if(days<=30)return ['expiring','gold',`Expires in ${days} days`];return ['verified','',`Verified - Expires ${date(u.exp)}`]}
function splash(){const slides=[['01','Find clinical shifts nearby.','Open shifts are filtered by your verified roles and sorted by distance.'],['02','Claim with lock-in protection.','If a facility cancels close to start time, your two-hour guarantee is tracked automatically.'],['03','Arrive, clock in, get paid.','On My Way alerts, live arrival status, and earnings are built into the workflow.']];const s=slides[state.slide];screen(`<div class="theme-float">${themeButton()}</div>${logo('hero')}<div class="greeting"><strong>Welcome to PulseShift.</strong><br/>Let's get you shift-ready.</div><section class="card stack"><div class="num">${s[0]}</div><p class="eyebrow">V1 marketplace</p><h1>${s[1]}</h1><p class="muted">${s[2]}</p></section><div class="stack" style="margin-top:18px"><button class="btn block" data-act="next">${state.slide===2?'Choose Roles':'Next'}</button><button class="btn ghost block" data-act="role">Skip</button></div>`,'',true)}
function roleSelect(){screen(`${header('Multi-role onboarding')}<div class="between" style="margin-bottom:16px"><div><h2>Select your roles</h2><p class="muted">Choose every role you are qualified to work. Your feed and credential checklist update together.</p></div></div><div class="grid">${ROLES.map(([id,label])=>{const sel=selectedRoles().includes(id);return `<button class="role ${sel?'sel':''}" data-act="setrole" data-id="${id}"><span class="ico">${icon(id==='RN'||id==='LPN'?'shield':'file')}</span>${sel?`<span class="check">${icon('check')}</span>`:''}<div style="margin-top:12px"><h3 class="serif" style="font-size:22px">${id}</h3><p class="muted" style="font-size:13px">${label}</p></div></button>`}).join('')}</div><div class="stack" style="margin-top:18px"><button class="btn block" data-act="upload">Continue with ${rolesLabel()}</button><button class="btn ghost block" data-act="facility">Continue as Facility</button></div>`,'',true)}
function uploadPage(){const req=required();const done=req.filter(k=>state.uploads[k]).length;screen(`${header('Credential upload')}<div class="between"><div><h2>${rolesLabel()} checklist</h2><p class="muted">Step ${Math.min(done+1,req.length)} of ${req.length}. Upload the union of required credentials for your selected roles.</p></div><span class="pill">${done}/${req.length}</span></div><div class="progress">${req.map(k=>`<span class="seg ${state.uploads[k]?'on':''}"></span>`).join('')}</div><div class="stack">${req.map(uploadCard).join('')}</div><div class="stack" style="margin-top:18px"><button class="btn block" ${done<req.length?'disabled style="opacity:.45;box-shadow:none"':''} data-act="enter">Enter Shift Feed</button><p class="muted" style="font-size:13px">${done<req.length?'Profile remains pending until required credentials are uploaded.':'All required items are uploaded and ready for review.'}</p></div>`,'',true)}
function uploadCard(k){const m=CREDENTIALS[k],u=state.uploads[k];return `<article class="card cred"><span class="ico">${icon(m[2])}</span><div class="stack" style="gap:10px"><div><p class="ctitle">${m[0]}</p><p class="muted" style="font-size:13px">${m[1]}</p></div>${u?`<div class="upload row" style="color:var(--teal);font-weight:600">${icon('check')} Uploaded</div>`:`<button class="upload" style="text-align:left;color:var(--teal);font-weight:600" data-act="uploadcred" data-id="${k}">${icon('file')} Upload document</button>`}${k!=='backgroundCheck'?`<div class="field"><label>Expiration date</label><input type="date" /></div>`:''}</div></article>`}
function openShifts(){const roles=selectedRoles();return state.shifts.filter(s=>s.status==='open'&&roles.includes(s.role)).sort((a,b)=>a.distance-b.distance)}function myShifts(){return state.shifts.filter(s=>s.claimedBy==='worker-demo').sort((a,b)=>a.start-b.start)}
function shiftCard(s,detail=false){const mine=s.claimedBy==='worker-demo';const mins=(s.start-Date.now())/60000;const travel=mine&&s.status==='claimed'&&mins<=60&&mins>-30;const tone=s.role==='CNA'?'gold':s.role==='MA'?'red':'';return `<article class="card shift ${travel&&!s.onMyWayAt?'hot':''}"><div class="shift-main"><span class="ico ${tone}">${icon('briefcase')}</span><div><div class="between" style="align-items:flex-start"><div><h3>${s.facility}</h3><p class="muted" style="font-size:13px">${s.role} - ${s.distance.toFixed(1)} mi<br>${shiftTime(s)}</p></div>${s.urgent?`<span class="pill red">Urgent</span>`:''}</div>${mine?`<span class="pill navy" style="margin-top:10px">${icon('lock')} Shift Lock</span>`:''}</div><div><p class="rate">$${s.rate}</p><p class="muted" style="font-size:12px;text-align:right">${hours(s).toFixed(0)} hrs</p></div></div>${detail?detailActions(s):shiftActions(s,travel)}</article>`}
function detailActions(s){if(s.status!=='open')return `<span class="pill navy">Already claimed</span>`;return `<div class="stack"><button class="btn block" data-act="claim" data-id="${s.id}">Claim Shift</button><div class="info row">${icon('lock')}<span>Shift Lock active - if this shift is cancelled within 4hrs of start, you receive 2hr pay automatically.</span></div></div>`}
function shiftActions(s,travel){if(s.status==='open')return `<button class="btn ghost block" data-act="detail" data-id="${s.id}">View Details</button>`;if(s.status==='cancelled')return `<span class="pill red">Cancelled</span>`;if(s.clockOutAt)return `<span class="pill navy">Shift Complete - ${((s.clockOutAt-s.clockInAt)/3600000).toFixed(1)} hrs</span>`;if(s.clockInAt)return `<div class="between"><span class="pill">${icon('clock')} Clocked In - ${elapsed(s.clockInAt)}</span><button class="btn small ghost" data-act="out" data-id="${s.id}">End Shift</button></div>`;if(s.onMyWayAt)return `<div class="between"><span class="pill navy">En Route - ETA ${s.eta} min</span><button class="btn small" data-act="clockin" data-id="${s.id}">Clock In</button></div>`;if(travel)return `<button class="btn block pulse" data-act="omw" data-id="${s.id}">On My Way</button>`;return `<span class="pill navy">${s.status}</span>`}
function workerPage(){if(state.workerTab==='mine')return myPage();if(state.workerTab==='cred')return credPage();if(state.workerTab==='profile')return profilePage();const inactive=required().some(k=>!state.uploads[k]||credStatus(k)[0]==='expired');screen(`${header('Shifts near you')}<div class="between" style="margin-bottom:16px"><div><h2>Open Shifts</h2><p class="muted">Filtered for ${rolesLabel()}, within 25 miles, sorted by distance.</p></div><span class="pill">${rolesLabel()}</span></div>${inactive?`<section class="soft stack" style="margin-bottom:16px"><h3>Profile pending</h3><p class="muted">Upload and maintain every required credential before accepting shifts.</p><button class="btn small" data-act="wtab" data-id="cred">Review Credentials</button></section>`:''}<div class="stack">${openShifts().map(s=>shiftCard(s)).join('')||`<section class="card"><p class="muted">No open shifts match ${rolesLabel()} right now.</p></section>`}</div>`,workerTabs())}
function detailPage(){const s=state.shifts.find(x=>x.id===state.detail)||openShifts()[0];screen(`${header('Shift detail')}<div class="between" style="margin-bottom:16px"><h2>Shift Detail</h2><button class="btn small ghost" data-act="worker">Back</button></div>${s?shiftCard(s,true):'<section class="card">Shift not found.</section>'}<section class="card stack" style="margin-top:14px"><p class="eyebrow">Payout model</p><p class="muted">Claim transaction sets status to claimed, claimedBy to your uid, and lockedAt to server time. Facility gets a push notification.</p></section>`,workerTabs())}
function myPage(){const mine=myShifts();const regular=mine.filter(s=>s.clockOutAt).reduce((a,s)=>a+((s.clockOutAt-s.clockInAt)/3600000)*s.rate,0);const lock=mine.filter(s=>s.lockPaid).reduce((a,s)=>a+s.lockHours*s.rate,0);screen(`${header('Upcoming and earnings')}<section class="card earn stack" style="margin-bottom:16px"><p class="eyebrow">This week</p><p class="amount">$${Math.round(regular+lock)}</p><p class="muted">Includes completed shifts and lock-in guarantee payouts.</p></section><div class="between" style="margin-bottom:14px"><h2>My Shifts</h2><span class="pill">${mine.length}</span></div><div class="stack">${mine.map(s=>shiftCard(s)).join('')||`<section class="card"><p class="muted">Claim a shift to see it here.</p></section>`}</div><section class="card stack" style="margin-top:16px"><p class="eyebrow">Earnings history</p>${historyRows(mine)}</section>`,workerTabs())}
function historyRows(mine){const rows=[];mine.forEach(s=>{if(s.clockOutAt)rows.push(`<div class="tx"><div><strong>${s.facility}</strong><p class="muted">Regular shift payout</p></div><strong>$${Math.round(((s.clockOutAt-s.clockInAt)/3600000)*s.rate)}</strong></div>`);if(s.lockPaid)rows.push(`<div class="tx"><div><strong class="gold-text">Lock-In Guarantee</strong><p class="muted">${s.facility}</p></div><strong class="gold-text">$${s.lockHours*s.rate}</strong></div>`)});return rows.join('')||'<p class="muted">No earnings yet.</p>'}
function credPage(){const req=required();const issues=req.filter(k=>['expired','expiring','pending'].includes(credStatus(k)[0]));screen(`${header('Credential alerts')}${issues.length||req.length?`<section class="banner ${issues.length?'dark':''} toast-banner">${issues.length?`${issues.length} credential(s) need attention`:'All credentials active'}</section>`:''}<div class="stack">${req.map(credBadge).join('')}</div><section class="soft stack" style="margin-top:16px"><p class="eyebrow">Notification schedule</p><p class="muted">Alerts send at 60, 30, and 7 days. Expired credentials pause shift access until renewal is uploaded.</p></section>`,workerTabs())}
function credBadge(k){const m=CREDENTIALS[k],s=credStatus(k),tone=s[1];const color=tone==='red'?'var(--red)':tone==='gold'?'var(--gold)':'var(--muted)';return `<article class="card cred"><span class="ico ${tone}">${icon(m[2])}</span><div><p class="ctitle">${m[0]}</p><p class="muted" style="color:${color}">${s[2]}</p>${s[0]==='expired'?`<button class="btn small red" style="margin-top:10px" data-act="uploadcred" data-id="${k}">Upload Renewal</button>`:''}</div></article>`}
function profilePage(){screen(`${header('Profile')}<section class="card stack"><div class="between"><div><h2>Alex Rivera</h2><p class="muted">${rolesLabel()} - 8 years experience</p></div><span class="pill">Active</span></div><button class="btn ghost block">Payout Settings</button><button class="btn ghost block" data-act="role">Change Roles</button></section><section class="card stack" style="margin-top:16px"><p class="eyebrow">Recent notifications</p>${state.notices.map(n=>`<div class="tx"><div><strong>${n.title}</strong><p class="muted">${n.body}</p></div></div>`).join('')||'<p class="muted">No notifications yet.</p>'}</section>`,workerTabs())}
function facilityPage(){if(state.facilityTab==='posted')return facilityShifts();if(state.facilityTab==='account')return facilityAccount();screen(`${header('Facility tools')}<div class="between" style="margin-bottom:16px"><div><h2>Post Shift</h2><p class="muted">Urgent is auto-flagged when start time is within 6 hours.</p></div></div><section class="card stack"><div class="field"><label>Role needed</label><select><option>RN</option><option>LPN</option><option>CNA</option><option>MA</option></select></div><div class="field"><label>Hourly rate</label><input type="number" value="68" /></div><div class="field"><label>Notes</label><textarea>Telemetry floor, active license required.</textarea></div><button class="btn block" data-act="post">Post Shift</button></section>`,facilityTabs())}
function facilityShifts(){screen(`${header('Facility shift board')}<div class="between" style="margin-bottom:16px"><h2>My Shifts</h2><span class="pill">${state.shifts.length}</span></div><div class="stack">${state.shifts.map(facilityCard).join('')}</div>`,facilityTabs())}
function facilityCard(s){const can=s.claimedBy&&s.status!=='cancelled'&&s.status!=='completed';const st=s.clockInAt?`Checked in at ${time(s.clockInAt)}`:s.onMyWayAt?`On the way - ETA ${s.eta} min`:'Awaiting arrival';return `<article class="card shift"><div class="between"><div><h3>${s.facility}</h3><p class="muted">${s.role} - ${st}</p></div><span class="pill navy">${s.status}</span></div>${s.claimedBy?`<div class="soft row"><span class="avatar" style="width:34px;height:34px">AR</span><div><strong>Alex Rivera</strong><p class="muted">${st}</p></div></div>`:'<p class="muted">No worker claimed yet.</p>'}${can?`<button class="btn ghost block" data-act="cancel" data-id="${s.id}">Cancel Shift</button>`:''}</article>`}
function facilityAccount(){screen(`${header('Account')}<section class="card stack"><div class="between"><div><h2>Northline</h2><p class="muted">Hospital - verified facility</p></div><span class="pill">Verified</span></div><div class="soft"><p class="eyebrow">Transparency score</p><p class="amount">96</p></div><button class="btn ghost block">Billing</button><button class="btn ghost block">Usage History</button></section>`,facilityTabs())}
function modalHtml(){if(!state.modal)return'';const s=state.shifts.find(x=>x.id===state.modal);if(!s)return'';const hrs=Math.max(0,(s.start-Date.now())/3600000).toFixed(1),payout=s.lockHours*s.rate;return `<div class="modal-bg"><section class="modal stack"><h2>Cancel this shift?</h2><p class="muted">This shift starts in ${hrs} hrs. Cancelling now will trigger an automatic 2-hour lock-in payment of $${payout} to Alex Rivera. This cannot be undone.</p><div class="between"><button class="btn ghost" data-act="closemodal">Go Back</button><button class="btn red" data-act="confirmcancel">Confirm & Cancel</button></div></section></div>`}
function elapsed(start){const v=Math.max(0,Math.floor((Date.now()-start)/1000));return `${String(Math.floor(v/3600)).padStart(2,'0')}:${String(Math.floor(v%3600/60)).padStart(2,'0')}:${String(v%60).padStart(2,'0')}`}
function mutateShift(id,fn){state.shifts=state.shifts.map(s=>s.id===id?fn(s):s)}
function toggleRole(id){const set=new Set(selectedRoles());if(set.has(id)&&set.size>1)set.delete(id);else set.add(id);state.roles=[...set];state.role=primaryRole()}
function handle(action,id){if(action==='theme'){state.theme=state.theme==='dark'?'light':'dark';applyTheme()}if(action==='next'){state.slide<2?state.slide++:state.route='role'}if(action==='role'||action==='home')state.route='role';if(action==='setrole')toggleRole(id);if(action==='upload')state.route='upload';if(action==='facility'){state.type='facility';state.facilityTab='post';state.route='facility'}if(action==='enter'){state.type='worker';state.workerTab='shifts';state.route='worker'}if(action==='worker')state.route='worker';if(action==='wtab'){state.workerTab=id;state.route='worker'}if(action==='ftab'){state.facilityTab=id;state.route='facility'}if(action==='detail'){state.detail=id;state.route='detail'}if(action==='uploadcred'){state.uploads[id]={exp:id==='backgroundCheck'?null:Date.now()+(id==='bls'?28:120)*86400000};note('Credential uploaded',`${CREDENTIALS[id][0]} is now pending review.`)}if(action==='claim'){mutateShift(id,s=>({...s,status:'claimed',claimedBy:'worker-demo',lockedAt:Date.now()}));note('Shift claimed','Facility has been notified.');state.workerTab='mine';state.route='worker'}if(action==='omw'){mutateShift(id,s=>({...s,onMyWayAt:Date.now(),eta:18}));note('Facility notified','Alex Rivera is on their way - estimated arrival in 18 minutes.')}if(action==='clockin'){mutateShift(id,s=>({...s,status:'in_progress',clockInAt:Date.now()}));note('Clock-in sent','Alex Rivera has arrived and clocked in.')}if(action==='out'){mutateShift(id,s=>({...s,status:'completed',clockOutAt:Date.now()}));note('Shift complete','Payout calculation has been triggered.')}if(action==='cancel')state.modal=id;if(action==='closemodal')state.modal=null;if(action==='confirmcancel'){const mid=state.modal;mutateShift(mid,s=>{const paid=s.claimedBy&&s.start-Date.now()<=4*3600000;if(paid)note('Lock-In Guarantee',`Your shift was cancelled. Your lock-in payment of $${s.lockHours*s.rate} is on its way.`);return {...s,status:'cancelled',lockPaid:paid}});state.modal=null}if(action==='post'){note('Shift posted','Matching nearby workers will be notified.');state.facilityTab='posted';state.route='facility'}save();render()}
function render(){applyTheme();clearInterval(tick);if(state.route==='splash')splash();else if(state.route==='role')roleSelect();else if(state.route==='upload')uploadPage();else if(state.route==='detail')detailPage();else if(state.route==='facility')facilityPage();else workerPage();tick=setInterval(()=>{if(state.route==='worker'&&state.workerTab==='mine')myPage()},1000)}
app.addEventListener('click',e=>{const btn=e.target.closest('[data-act]');if(!btn)return;handle(btn.dataset.act,btn.dataset.id)});
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
render();
})();
</script></body>
</html>
