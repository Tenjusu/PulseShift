<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PulseShift</title>
    <meta name="theme-color" content="#0a1628" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cream: #f7f2e8;
        --paper: #fffaf0;
        --navy: #0a1628;
        --teal: #0d9488;
        --teal-soft: #d9f3f0;
        --red: #d95f5f;
        --ink-soft: #607083;
        --line: #d9e1e7;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--cream);
        color: var(--navy);
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button, input, select, textarea { font: inherit; }
      .app {
        width: min(460px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        background: var(--paper);
        border-inline: 1px solid rgba(10, 22, 40, 0.08);
        box-shadow: 0 24px 80px rgba(10, 22, 40, 0.14);
      }
      .screen { min-height: 100vh; padding: 28px 22px 96px; }
      .logo { display: block; width: min(340px, 92%); height: auto; }
      .logo.hero { margin: 52px auto 30px; }
      .logo.small { width: 188px; }
      .logo-line { fill: none; stroke: var(--teal); stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
      .logo-word {
        fill: #dff7fb;
        stroke: var(--teal);
        stroke-width: 0.7;
        paint-order: stroke;
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 58px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .eyebrow { color: var(--teal); font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }
      h1, h2, h3, p { margin-block: 0; }
      h1 { margin-top: 10px; font-family: "DM Serif Display", Georgia, serif; font-size: 46px; line-height: 0.96; font-weight: 400; }
      h2 { font-family: "DM Serif Display", Georgia, serif; font-size: 32px; line-height: 1; font-weight: 400; }
      .muted { color: var(--ink-soft); line-height: 1.55; }
      .stack { display: grid; gap: 14px; }
      .hero-copy { gap: 18px; }
      .actions { display: grid; gap: 12px; margin-top: 30px; }
      .btn {
        width: 100%;
        min-height: 54px;
        border: 0;
        border-radius: 999px;
        padding: 0 20px;
        background: var(--teal);
        color: white;
        font-weight: 800;
        cursor: pointer;
      }
      .btn.secondary { background: var(--navy); }
      .btn.ghost { background: transparent; color: var(--navy); border: 1px solid var(--line); }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 26px; }
      .avatar { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: var(--navy); color: white; font-weight: 800; }
      .section-head { display: flex; justify-content: space-between; align-items: end; gap: 12px; margin-bottom: 16px; }
      .pill { display: inline-flex; align-items: center; min-height: 30px; border-radius: 999px; padding: 0 12px; background: var(--teal-soft); color: var(--teal); font-size: 12px; font-weight: 800; }
      .pill.urgent { background: #ffe9e9; color: var(--red); }
      .card { border: 1px solid var(--line); border-radius: 8px; background: white; padding: 18px; box-shadow: 0 14px 32px rgba(10, 22, 40, 0.08); }
      .shift-card { display: grid; gap: 18px; }
      .shift-main { display: flex; justify-content: space-between; gap: 16px; }
      .shift-title { font-size: 18px; font-weight: 800; }
      .meta { color: var(--ink-soft); font-size: 14px; line-height: 1.45; }
      .shift-foot { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
      .rate { color: var(--navy); font-size: 22px; font-weight: 800; }
      .tabs {
        position: fixed;
        left: 50%;
        bottom: 0;
        width: min(460px, 100%);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: rgba(255, 250, 240, 0.96);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(14px);
      }
      .tab { min-height: 48px; border: 0; border-radius: 8px; color: var(--ink-soft); background: transparent; font-size: 12px; font-weight: 800; cursor: pointer; }
      .tab.active { background: var(--navy); color: white; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .metric { display: grid; gap: 6px; }
      .metric strong { font-size: 24px; }
      .field { display: grid; gap: 7px; }
      label { color: var(--navy); font-size: 13px; font-weight: 800; }
      input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: white; color: var(--navy); padding: 14px; outline-color: var(--teal); }
      textarea { min-height: 92px; resize: vertical; }
      .status-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-block: 12px; border-bottom: 1px solid var(--line); }
      .status-row:last-child { border-bottom: 0; }
      @media (min-width: 760px) {
        body { padding-block: 28px; }
        .app, .screen { min-height: calc(100vh - 56px); }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app"></div>
    <script>
      const roles = ["RN", "LPN", "CNA", "MA", "PCT", "Phlebotomist", "RadTech", "EMT"];
      const shifts = [
        { id: "s1", facility: "Northline Medical Center", role: "RN", time: "Today, 2:54 PM - 10:54 PM", rate: 68, distance: "3.1 mi", urgent: true, address: "440 Lakeview Ave" },
        { id: "s2", facility: "Harbor Urgent Care", role: "RN", time: "Tomorrow, 7:00 AM - 3:00 PM", rate: 62, distance: "6.4 mi", urgent: false, address: "1188 Harbor Rd" },
        { id: "s3", facility: "Greenway Surgery Center", role: "RN", time: "Fri, 6:00 PM - 2:00 AM", rate: 74, distance: "8.9 mi", urgent: false, address: "72 Greenway Blvd" }
      ];
      const state = {
        screen: "home",
        tab: "shifts",
        userType: "worker",
        role: "RN",
        claimed: JSON.parse(localStorage.getItem("pulseshift_claimed") || "[]")
      };
      const app = document.getElementById("app");
      function logo(className = "") {
        return `
          <svg class="logo ${className}" viewBox="0 0 620 160" role="img" aria-label="PulseShift logo">
            <path class="logo-line" d="M18 84 H86 L108 54 L132 122 L182 20 L232 142 L252 84 H298" />
            <text class="logo-word" x="316" y="108">PulseShift</text>
          </svg>
        `;
      }
      function setScreen(screen, tab) { state.screen = screen; if (tab) state.tab = tab; render(); }
      function saveClaim(id) {
        if (!state.claimed.includes(id)) {
          state.claimed.push(id);
          localStorage.setItem("pulseshift_claimed", JSON.stringify(state.claimed));
        }
      }
      function layout(content, tabs = "") { app.innerHTML = `<main class="screen">${content}</main>${tabs}`; }
      function workerTabs() {
        return `<nav class="tabs" aria-label="Worker navigation"><button class="tab ${state.tab === "shifts" ? "active" : ""}" onclick="setScreen('worker','shifts')">Shifts</button><button class="tab ${state.tab === "mine" ? "active" : ""}" onclick="setScreen('worker','mine')">My Shifts</button><button class="tab ${state.tab === "profile" ? "active" : ""}" onclick="setScreen('worker','profile')">Profile</button></nav>`;
      }
      function facilityTabs() {
        return `<nav class="tabs" aria-label="Facility navigation"><button class="tab ${state.tab === "post" ? "active" : ""}" onclick="setScreen('facility','post')">Post</button><button class="tab ${state.tab === "posted" ? "active" : ""}" onclick="setScreen('facility','posted')">My Shifts</button><button class="tab ${state.tab === "account" ? "active" : ""}" onclick="setScreen('facility','account')">Account</button></nav>`;
      }
      function topbar(subtitle = "Healthcare shift marketplace") {
        return `<header class="topbar"><div>${logo("small")}</div><div class="avatar">${state.userType === "worker" ? state.role : "F"}</div></header><p class="eyebrow">${subtitle}</p>`;
      }
      function shiftCard(shift, detail = false) {
        return `<article class="card shift-card"><div class="shift-main"><div><p class="shift-title">${shift.facility}</p><p class="meta">${shift.time}<br>${shift.address}</p></div>${shift.urgent ? `<span class="pill urgent">Urgent</span>` : ""}</div><div class="shift-foot"><span class="pill">${shift.role}</span><strong class="rate">$${shift.rate}/hr</strong><span class="meta">${shift.distance}</span></div>${detail ? `<button class="btn" onclick="claimShift('${shift.id}')">Claim Shift</button>` : `<button class="btn ghost" onclick="setScreen('detail-${shift.id}')">View Details</button>`}</article>`;
      }
      function claimShift(id) { saveClaim(id); setScreen("worker", "mine"); }
      function renderHome() {
        layout(`${logo("hero")}<section class="stack hero-copy"><p class="eyebrow">PulseShift</p><h1>Pick up shifts. Get paid fast.</h1><p class="muted">A clean mobile marketplace for verified healthcare pros and facilities that need reliable coverage.</p></section><div class="actions"><button class="btn" onclick="state.userType='worker'; setScreen('worker','shifts')">I'm a Healthcare Pro</button><button class="btn secondary" onclick="state.userType='facility'; setScreen('facility','post')">I'm a Facility</button><button class="btn ghost" onclick="setScreen('login')">Log In</button></div>`);
      }
      function renderLogin() {
        layout(`${logo("hero")}<section class="stack"><h2>Welcome back</h2><div class="field"><label>Email</label><input type="email" value="alex@pulseshift.demo"></div><div class="field"><label>Password</label><input type="password" value="password"></div><button class="btn" onclick="setScreen('worker','shifts')">Log In</button><button class="btn ghost" onclick="setScreen('home')">Back</button></section>`);
      }
      function renderWorker() {
        if (state.tab === "mine") return renderWorkerMine();
        if (state.tab === "profile") return renderProfile();
        layout(`${topbar("Open shifts")}<div class="section-head"><div><h2>Open Shifts</h2><p class="muted">Filtered for ${state.role}, sorted by distance.</p></div><span class="pill">${state.role}</span></div><div class="stack">${shifts.filter(s => s.role === state.role).map(s => shiftCard(s)).join("")}</div>`, workerTabs());
      }
      function renderDetail(id) {
        const shift = shifts.find(s => s.id === id) || shifts[0];
        layout(`${topbar("Shift detail")}<div class="section-head"><h2>Shift Detail</h2><button class="btn ghost" style="width:auto;min-height:40px" onclick="setScreen('worker','shifts')">Back</button></div>${shiftCard(shift, true)}<section class="card stack" style="margin-top:14px"><p class="shift-title">What to expect</p><p class="muted">Telemetry floor support, active license required. Claiming uses an atomic Firestore transaction in production.</p></section>`, workerTabs());
      }
      function renderWorkerMine() {
        const claimed = shifts.filter(s => state.claimed.includes(s.id));
        const total = claimed.reduce((sum, s) => sum + s.rate * 8, 0);
        layout(`${topbar("My shifts")}<div class="grid-2" style="margin-bottom:16px"><div class="card metric"><span class="meta">This week</span><strong>$${total}</strong></div><div class="card metric"><span class="meta">All time</span><strong>$${total}</strong></div></div><div class="section-head"><h2>Upcoming</h2><span class="pill">${claimed.length}</span></div><div class="stack">${claimed.length ? claimed.map(s => shiftCard(s)).join("") : `<div class="card"><p class="muted">Claim a shift to see it here.</p></div>`}</div>`, workerTabs());
      }
      function renderProfile() {
        layout(`${topbar("Profile")}<div class="section-head"><h2>Credentials</h2><span class="pill">Verified</span></div><section class="card"><div class="status-row"><strong>License</strong><span class="pill">Active</span></div><div class="status-row"><strong>Background check</strong><span class="pill">Clear</span></div><div class="status-row"><strong>Immunizations</strong><span class="pill urgent">Pending</span></div></section><div class="actions"><button class="btn">Edit Profile</button><button class="btn ghost">Payout Settings</button></div>`, workerTabs());
      }
      function renderFacility() {
        if (state.tab === "posted") return renderPosted();
        if (state.tab === "account") return renderAccount();
        layout(`${topbar("Facility tools")}<div class="section-head"><h2>Post Shift</h2><span class="pill">Facility</span></div><section class="card stack"><div class="field"><label>Role needed</label><select>${roles.map(r => `<option>${r}</option>`).join("")}</select></div><div class="grid-2"><div class="field"><label>Date</label><input type="date"></div><div class="field"><label>Hourly rate</label><input type="number" value="68"></div></div><div class="grid-2"><div class="field"><label>Start</label><input type="time" value="14:00"></div><div class="field"><label>End</label><input type="time" value="22:00"></div></div><div class="field"><label>Notes</label><textarea>Telemetry floor, active license required.</textarea></div><button class="btn" onclick="setScreen('facility','posted')">Post Shift</button></section>`, facilityTabs());
      }
      function renderPosted() { layout(`${topbar("Posted shifts")}<div class="section-head"><h2>My Shifts</h2><span class="pill">3 active</span></div><div class="stack">${shifts.map(s => shiftCard(s)).join("")}</div>`, facilityTabs()); }
      function renderAccount() { layout(`${topbar("Account")}<section class="card"><div class="status-row"><strong>Billing</strong><span class="pill">Connected</span></div><div class="status-row"><strong>Usage this month</strong><span class="meta">18 shifts</span></div><div class="status-row"><strong>Verification</strong><span class="pill">Active</span></div></section><div class="actions"><button class="btn ghost">Settings</button></div>`, facilityTabs()); }
      function render() {
        if (state.screen === "home") return renderHome();
        if (state.screen === "login") return renderLogin();
        if (state.screen === "worker") return renderWorker();
        if (state.screen.startsWith("detail-")) return renderDetail(state.screen.replace("detail-", ""));
        if (state.screen === "facility") return renderFacility();
      }
      render();
    </script>
  </body>
</html>
